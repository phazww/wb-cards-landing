            width: 72px;

            border-radius: 50%;
            background: rgba(139, 65, 255, 0.15);
            border: 2px solid #8B41FF;
            color: #8B41FF;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 0 20px rgba(139, 65, 255, 0.3);

        .thanks-icon svg,

            width: 36px !important;

            margin-bottom: 16px;

        }

            font-size: 15px;
            color: #94A3B8;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .thanks-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .btn-outline-telegram {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: #ffffff !important;
        }
        .btn-outline-telegram:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.25) !important;
